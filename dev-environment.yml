name: breseq-dev
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
# Needed for compiling
#  => Should be compatible with any versions
  - cxx-compiler
  - autoconf
  - automake
  - libtool
  - pkg-config
  - m4
  - cmake
# Dynamically linked libraries.
#   => Need to lock versions for consistency
  - zlib=1.3.2
  - miniz=3.1.1
  - htslib=1.23.1
# Static-only prerequisites for binarydist.sh (CRAM codec support in htslib)
#   => Need to lock versions for consistency
  - bzip2=1.0.8
  - xz=5.8.3
# Command line tools run by breseq
#  => Need to lock versions for consistency
  - samtools=1.23.1
  - bowtie2=2.5.5
  - gnuplot=6.0.4
  - phylip=3.697
  - pip
  - pip:
    # CNery doesn't pin an upper bound on pandas; pip otherwise resolves the
    # newest pandas (3.x), which dropped the private DataFrame._append that
    # CNery's HMM code still calls, crashing at runtime.
    - pandas>=2.2.0,<3
    - git+https://github.com/barricklab/CNery.git
# Used to run the consistency tests in parallel ('make test')
#  => See tests/Snakefile
  - python
  - snakemake-minimal
# Used to build the documentation website (mkdocs) -- 'make docs'/./binarydist.sh
#  => Unpinned: pure build tooling, doesn't affect breseq's own output reproducibility
  - mkdocs
  - mkdocs-material
  - mike
